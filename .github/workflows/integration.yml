name: Integration

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev libxtst-dev libevdev-dev libxkbcommon-dev pkg-config xvfb

      # On Linux, run under a virtual X server so the daemon smoke test can
      # actually initialise GTK + XRecord/XTest.
      - name: Run integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a go test -tags integration -v -run 'TestCLI|TestDaemon' .

      - name: Run integration tests (macOS)
        if: runner.os == 'macOS'
        run: go test -tags integration -v -run 'TestCLI' .

      - name: Run integration tests (Windows)
        if: runner.os == 'Windows'
        env:
          CGO_ENABLED: "0"
        run: go test -tags integration -v -run 'TestCLI' .
